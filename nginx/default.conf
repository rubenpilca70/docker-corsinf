server {
    # Puerto en el que Nginx escucha dentro del contenedor
    # Docker expone este puerto al host según lo definido en docker-compose.yml
    listen 80;

    # Nombre del servidor; "localhost" funciona para desarrollo local
    server_name localhost;

    # ── RAÍZ DEL SITIO ──────────────────────────────────────────────────────────
    # Carpeta física dentro del contenedor donde viven los archivos PHP
    # El volumen en docker-compose mapea ./src  →  /var/www/html
    # Por lo tanto  ./src/corsinf  →  /var/www/html/corsinf
    root /var/www/html/corsinf;

    # Archivos que Nginx busca cuando se pide un directorio (en orden de prioridad)
    index index.php index.html index.htm;

    # Codificación de caracteres para todas las respuestas de texto
    charset utf-8;

    # Tamaño máximo permitido para el cuerpo de una petición (subida de archivos, POST)
    client_max_body_size 64M;

    # Archivos de log dentro del contenedor Nginx
    access_log /var/log/nginx/access.log;  # cada petición recibida
    error_log  /var/log/nginx/error.log;   # errores del servidor

    # ── ARCHIVOS ESTÁTICOS ───────────────────────────────────────────────────────
    # Nginx sirve directamente imágenes, CSS, JS, fuentes, etc.
    # Nunca llegan a PHP-FPM → menos carga y mayor velocidad
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|map|webp)$ {
        # El navegador puede cachear estos archivos durante 1 año
        expires 1y;
        add_header Cache-Control "public, immutable";

        # No registrar en el log de acceso (reduciría ruido innecesario)
        access_log off;

        # Si el archivo no existe devuelve 404 en lugar de intentar otra ruta
        try_files $uri =404;
    }

    # ── RUTAS AMIGABLES (SPA / frameworks) ──────────────────────────────────────
    # Intenta servir: 1) archivo exacto  2) directorio  3) delega a index.php
    # Esto permite URLs limpias como /usuarios/perfil sin extensión .php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PROCESAMIENTO PHP ────────────────────────────────────────────────────────
    # Solo los archivos .php pasan por PHP-FPM; el resto lo resuelve Nginx solo
    location ~ \.php$ {
        # Si el archivo .php no existe en disco devuelve 404 (evita ejecución fantasma)
        try_files $uri =404;

        # Separa la ruta del script de la info de ruta extra
        # Ejemplo: /index.php/foo  →  script=/index.php  path_info=/foo
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # "php" es el nombre del servicio en docker-compose.yml
        # Puerto 9000 es el que PHP-FPM expone dentro de la red Docker interna
        fastcgi_pass php:9000;

        # Archivo PHP por defecto cuando se pide un directorio
        fastcgi_index index.php;

        # Incluye los parámetros FastCGI estándar (HTTP_HOST, REMOTE_ADDR, etc.)
        include fastcgi_params;

        # Ruta absoluta del script que PHP-FPM debe ejecutar
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Info de ruta extra (útil para frameworks que la usan)
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Nombre del servidor tal como lo ve PHP ($_SERVER['SERVER_NAME'])
        fastcgi_param SERVER_NAME $host;

        # ── Timeouts ────────────────────────────────────────────────────────────
        # Tiempo máximo esperando que PHP-FPM responda (scripts lentos / consultas pesadas)
        fastcgi_read_timeout    300;

        # Tiempo máximo para establecer conexión con PHP-FPM
        fastcgi_connect_timeout 300;

        # Tiempo máximo para enviar la petición a PHP-FPM
        fastcgi_send_timeout    300;

        # ── Buffers ─────────────────────────────────────────────────────────────
        # 16 buffers de 16 KB para respuestas normales
        fastcgi_buffers      16 16k;

        # Buffer extra para la cabecera de la respuesta FastCGI
        fastcgi_buffer_size  32k;
    }

    # ── SEGURIDAD: archivos ocultos ──────────────────────────────────────────────
    # Bloquea acceso a .htaccess, .git, .env, etc. que empiecen con punto
    location ~ /\. {
        deny all;
        access_log  off;
        log_not_found off;
    }

    # ── SEGURIDAD: archivos sensibles ───────────────────────────────────────────
    # Bloquea acceso directo a archivos de configuración, logs y scripts de shell
    location ~* \.(env|log|sh|sql)$ {
        deny all;
    }
}
