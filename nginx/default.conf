server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html index.htm;

    charset utf-8;
    client_max_body_size 64M;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Static files — served directly by Nginx without hitting PHP
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|map|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Friendly URLs: try file → directory → fallback to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing via PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # "php" matches the service name in docker-compose.yml
        fastcgi_pass php:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param SERVER_NAME     $host;

        fastcgi_read_timeout    300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout    300;

        fastcgi_buffers         16 16k;
        fastcgi_buffer_size     32k;
    }

    # Block access to hidden files (.htaccess, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block direct access to PHP config/sensitive files
    location ~* \.(env|log|sh|sql)$ {
        deny all;
    }
}
