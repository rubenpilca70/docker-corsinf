; ============================================================
;  PHP — Configuración PRODUCCIÓN
;  Montar en: /usr/local/etc/php/conf.d/custom.ini
; ============================================================

[PHP]
; --- Errores: nunca exponer al cliente ---
display_errors         = Off
display_startup_errors = Off
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors             = On
error_log              = /proc/self/fd/2
ignore_repeated_errors = On

; --- Recursos ---
memory_limit           = 256M
max_execution_time     = 30
max_input_time         = 30
max_input_vars         = 1000
default_socket_timeout = 30

; --- Subida de archivos ---
file_uploads           = On
upload_max_filesize    = 32M
post_max_size          = 32M
max_file_uploads       = 10

; --- Internacionalización ---
default_charset        = UTF-8
date.timezone          = America/Mexico_City

; --- Multibyte ---
mbstring.language      = UTF-8
mbstring.internal_encoding = UTF-8

; --- Sesiones (hardened) ---
session.gc_maxlifetime  = 1800
session.cookie_httponly = 1
session.cookie_secure   = 1
session.use_strict_mode = 1
session.use_only_cookies = 1
session.sid_length      = 48
session.sid_bits_per_character = 6

; --- Seguridad ---
expose_php             = Off
allow_url_fopen        = Off
allow_url_include      = Off
disable_functions      = exec,passthru,shell_exec,system,proc_open,popen,\
                         curl_multi_exec,parse_ini_file,show_source,phpinfo

; --- Realpath cache (más agresivo en prod, archivos no cambian) ---
realpath_cache_size    = 8192K
realpath_cache_ttl     = 600

; ============================================================
[opcache]
; Sin revalidación: máximo rendimiento
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 20000
opcache.revalidate_freq        = 0
opcache.validate_timestamps    = 0
opcache.save_comments          = 0
opcache.fast_shutdown          = 1
opcache.huge_code_pages        = 1
opcache.preload_user           = www-data
