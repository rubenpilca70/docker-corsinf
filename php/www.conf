[www]
user  = www-data
group = www-data

; Puerto donde PHP-FPM escucha (coincide con nginx: fastcgi_pass php:9000)
listen = 9000

; ============================================================
; PROCESS MANAGER
; ============================================================
; dynamic permite escalar workers según carga
pm = dynamic

; Máximo número de procesos hijos (workers simultáneos)
pm.max_children = 20

; Procesos creados al iniciar
pm.start_servers = 6

; Mínimo de procesos inactivos (idle)
pm.min_spare_servers = 4

; Máximo de procesos inactivos
pm.max_spare_servers = 10

; Reinicio de workers para evitar memory leaks
pm.max_requests = 500

; ============================================================
; TIMEOUTS
; ============================================================
; Tiempo máximo de ejecución por request
request_terminate_timeout = 300

; ============================================================
; SLOW LOG (diagnóstico de rendimiento)
; ============================================================
; Log de requests lentas (>3 segundos)
request_slowlog_timeout = 3s
slowlog = /proc/self/fd/2

; ============================================================
; LOGGING
; ============================================================
; Redirige logs a stdout/stderr (Docker best practice)
access.log = /proc/self/fd/2

; ============================================================
; ENTORNO
; ============================================================
; Permite variables de entorno dentro de PHP
clear_env = no

; ============================================================
; SEGURIDAD / ESTABILIDAD
; ============================================================
; Limita archivos que puede procesar PHP (opcional)
;security.limit_extensions = .php .php3 .php4 .php5 .php7 .php8

; ============================================================
; STATUS (opcional, útil para monitoreo)
; ============================================================
; Descomentar si quieres métricas tipo /status
;pm.status_path = /status
;ping.path = /ping
;ping.response = pong