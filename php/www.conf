[www]
; Usuario y grupo con el que corren los procesos PHP-FPM
user  = www-data
group = www-data

; Puerto donde PHP-FPM escucha (debe coincidir con fastcgi_pass en nginx)
listen = 9000

; ── PROCESS MANAGER ──────────────────────────────────────────────────────────
; dynamic: arranca con un mínimo de workers y escala según la carga
; es el mejor balance para desarrollo con picos de tráfico
pm = dynamic

; Máximo de procesos PHP simultáneos
; Fórmula orientativa: RAM disponible para PHP / ~30 MB por proceso
pm.max_children = 20

; Workers que se levantan al iniciar el contenedor
pm.start_servers = 5

; Mínimo de workers libres esperando peticiones
; Si baja de este número, FPM crea más procesos automáticamente
pm.min_spare_servers = 5

; Máximo de workers libres; si hay más FPM los mata para liberar RAM
pm.max_spare_servers = 10

; Reinicia un worker después de N peticiones para evitar memory leaks
pm.max_requests = 500

; ── TIMEOUTS ─────────────────────────────────────────────────────────────────
; Tiempo máximo de ejecución de un script antes de matar el proceso
request_terminate_timeout = 300

; ── SLOW LOG ─────────────────────────────────────────────────────────────────
; Registra stack trace de peticiones que tarden más de N segundos
; Muy útil para detectar consultas SQL o código lento
request_slowlog_timeout = 3s
; /proc/self/fd/2 → escribe en stderr del contenedor (visible con: docker compose logs php)
slowlog = /proc/self/fd/2

; ── VARIABLES DE ENTORNO ─────────────────────────────────────────────────────
; Pasa las variables de entorno del contenedor a PHP
; Sin esto, getenv() no funciona dentro de FPM
clear_env = no
