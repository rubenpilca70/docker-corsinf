; ============================================================
;  PHP — Configuración DESARROLLO
;  Montar en: /usr/local/etc/php/conf.d/custom.ini
; ============================================================

[PHP]
; --- Errores ---
; Off → los errores NO se imprimen en pantalla (igual que XAMPP por defecto)
; los deprecated y demás siguen registrándose en el log, solo no se ven en el navegador
display_errors         = Off
display_startup_errors = Off
; E_ALL           → todos los errores y advertencias
; E_DEPRECATED    → uso de funciones obsoletas
; E_STRICT        → sugerencias de compatibilidad y buenas prácticas
error_reporting        = E_ALL | E_DEPRECATED | E_STRICT
log_errors             = On
; stderr del contenedor → los errores aparecen en: docker compose logs php
error_log              = /proc/self/fd/2

; --- Recursos ---
memory_limit           = 256M
max_execution_time     = 120
max_input_time         = 120
max_input_vars         = 5000
default_socket_timeout = 60

; --- Subida de archivos ---
file_uploads           = On
upload_max_filesize    = 64M
post_max_size          = 64M
max_file_uploads       = 20

; --- Internacionalización ---
default_charset        = UTF-8
date.timezone          = America/Mexico_City

; --- Multibyte ---
mbstring.language      = UTF-8
mbstring.internal_encoding = UTF-8

; --- Sesiones ---
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.use_strict_mode = 1
session.use_only_cookies = 1

; --- Seguridad (relajada en dev) ---
expose_php             = On

; --- Realpath cache ---
; Guarda en memoria la resolución de rutas de archivos
; Reduce las llamadas stat() al disco en cada petición → menos I/O
realpath_cache_size    = 16384K
realpath_cache_ttl     = 300

; ============================================================
[opcache]
opcache.enable                 = 1
opcache.enable_cli             = 0
; Memoria reservada para el bytecode compilado de PHP
opcache.memory_consumption     = 256
; Buffer para strings internos (nombres de clases, funciones, etc.)
opcache.interned_strings_buffer = 16
; Máximo de archivos PHP que OPcache puede compilar y guardar
opcache.max_accelerated_files  = 20000
; Revalida cada 2 segundos en vez de en cada petición
; Sigue detectando cambios en archivos pero reduce llamadas stat() al disco
opcache.revalidate_freq        = 2
opcache.validate_timestamps    = 1
opcache.save_comments          = 1
opcache.fast_shutdown          = 1
