; ============================================================
;  PHP — Configuración DESARROLLO
;  Montar en: /usr/local/etc/php/conf.d/custom.ini
; ============================================================

[PHP]
; --- Errores ---
; Off → los errores NO se imprimen en pantalla (igual que XAMPP por defecto)
; los deprecated y demás siguen registrándose en el log, solo no se ven en el navegador
display_errors         = Off
display_startup_errors = Off
; E_ALL           → todos los errores y advertencias
; E_DEPRECATED    → uso de funciones obsoletas
; E_STRICT        → sugerencias de compatibilidad y buenas prácticas
error_reporting        = E_ALL | E_DEPRECATED | E_STRICT
log_errors             = On
error_log              = /var/log/php/errors.log

; --- Recursos ---
memory_limit           = 256M
max_execution_time     = 120
max_input_time         = 120
max_input_vars         = 5000
default_socket_timeout = 60

; --- Subida de archivos ---
file_uploads           = On
upload_max_filesize    = 64M
post_max_size          = 64M
max_file_uploads       = 20

; --- Internacionalización ---
default_charset        = UTF-8
date.timezone          = America/Mexico_City

; --- Multibyte ---
mbstring.language      = UTF-8
mbstring.internal_encoding = UTF-8

; --- Sesiones ---
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.use_strict_mode = 1
session.use_only_cookies = 1

; --- Seguridad (relajada en dev) ---
expose_php             = On

; --- Realpath cache (acelera resolución de rutas) ---
realpath_cache_size    = 4096K
realpath_cache_ttl     = 120

; ============================================================
[opcache]
; Activo, pero revalida en cada petición para ver cambios al instante
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files  = 10000
opcache.revalidate_freq        = 0
opcache.validate_timestamps    = 1
opcache.save_comments          = 1
opcache.fast_shutdown          = 0
