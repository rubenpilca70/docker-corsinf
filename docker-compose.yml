version: '3.8'

services:

  nginx:
    image: nginx:alpine
    container_name: myapp_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - app_network
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp_php
    volumes:
      - ./src:/var/www/html
      # DEV:  ./php/php.dev.ini
      # PROD: ./php/php.prod.ini
      - ./php/php.dev.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge
